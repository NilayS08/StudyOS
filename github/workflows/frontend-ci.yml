name: Frontend CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'frontend/**'        # only runs when frontend files change
  pull_request:
    branches: [main, dev]
    paths:
      - 'frontend/**'

jobs:
  lint-and-build:
    name: Lint + Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend   # all steps run inside /frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run build check
        run: npm run build